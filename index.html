<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zentype</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="default">
    <button id="reaveal-btn">Start Typing</button>
    <div class="container">
      <div class="dashboard">
        <div class="dashboard-elements">
          <h3 id="correctCount">Correct:0</h3>
          <h3 id="wrongCount">wrong:0</h3>
          <h3 id="quoteCount">quote</h3>
          <button id="ThemeBtn">Theme</button>
        </div>
      </div>
      <div class="wrapper">
        <div class="main-container">
          <p id="para"></p>

          <!-- tilde before author added in css -->
          <h3 id="author"></h3>
        </div>
      </div>

      <div class="footer">made with love &copy</div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
